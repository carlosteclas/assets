<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark navy background -->
  <rect width="100" height="100" rx="16" fill="#0f1d3a"/>
  <!-- Slightly lighter inner panel -->
  <rect x="6" y="6" width="88" height="88" rx="12" fill="#152245"/>

  <!-- Outer ring of Q -->
  <circle cx="50" cy="45" r="26" fill="none" stroke="#00c4a0" stroke-width="8"/>
  <!-- Q diagonal tail -->
  <line x1="67" y1="62" x2="80" y2="76" stroke="#00c4a0" stroke-width="8" stroke-linecap="round"/>

  <!-- Three storage-node dots at the bottom (representing distributed NAS) -->
  <circle cx="37" cy="85" r="4.5" fill="#00c4a0" opacity="0.9"/>
  <circle cx="50" cy="85" r="4.5" fill="#00c4a0" opacity="0.9"/>
  <circle cx="63" cy="85" r="4.5" fill="#00c4a0" opacity="0.9"/>
</svg>
